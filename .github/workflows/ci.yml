name: TurqApp CI

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:

jobs:
  security-guards:
    name: Security Guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Security Regression Scan
        run: bash scripts/check_repo_security_regressions.sh

  flutter-quality:
    name: Flutter Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Unit + Widget tests
        run: flutter test --coverage

      - name: Enforce Coverage Floor
        run: bash scripts/check_flutter_coverage.sh

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-lcov
          path: coverage/lcov.info

  android-integration-smoke:
    name: Android Integration Smoke
    needs:
      - flutter-quality
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Check integration smoke secrets
        id: integration-secrets
        shell: bash
        env:
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "${INTEGRATION_LOGIN_EMAIL}" && -n "${INTEGRATION_LOGIN_PASSWORD}" && -n "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Android integration smoke secrets are missing; skipping emulator smoke lane."
          fi

      - name: Install Functions deps for seed automation
        if: steps.integration-secrets.outputs.available == 'true'
        run: |
          cd functions
          npm ci

      - name: Run Android integration smoke on emulator
        if: steps.integration-secrets.outputs.available == 'true'
        env:
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          INTEGRATION_AUTO_SEED: "1"
          INTEGRATION_REQUIRE_SEED: "1"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            export INTEGRATION_SMOKE_DEVICE_ID=emulator-5554
            bash scripts/run_turqapp_test_smoke.sh

      - name: Skip Android integration smoke without secrets
        if: steps.integration-secrets.outputs.available != 'true'
        run: echo "Android integration smoke skipped because required secrets are not configured."

      - name: Upload integration smoke artifacts
        if: always() && steps.integration-secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: integration-smoke-artifacts
          path: artifacts/integration_smoke

  ios-integration-smoke:
    name: iOS Integration Smoke
    needs:
      - flutter-quality
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15
    timeout-minutes: 110
    env:
      IOS_SIMULATOR_NAME: iPhone 16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Check integration smoke secrets
        id: integration-secrets
        shell: bash
        env:
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "${INTEGRATION_LOGIN_EMAIL}" && -n "${INTEGRATION_LOGIN_PASSWORD}" && -n "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "iOS integration smoke secrets are missing; skipping simulator smoke lane."
          fi

      - name: Install Functions deps for seed automation
        if: steps.integration-secrets.outputs.available == 'true'
        run: |
          cd functions
          npm ci

      - name: Install CocoaPods deps
        if: steps.integration-secrets.outputs.available == 'true'
        run: |
          cd ios
          pod install

      - name: Boot iOS simulator
        if: steps.integration-secrets.outputs.available == 'true'
        run: |
          SIM_UDID="$(xcrun simctl list devices available | awk -v name="$IOS_SIMULATOR_NAME" -F '[()]' '$0 ~ name {print $2; exit}')"
          if [[ -z "$SIM_UDID" ]]; then
            echo "Simulator not found: $IOS_SIMULATOR_NAME"
            exit 1
          fi
          xcrun simctl boot "$SIM_UDID" || true
          open -a Simulator --args -CurrentDeviceUDID "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
          echo "INTEGRATION_SMOKE_DEVICE_ID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Run iOS integration smoke
        if: steps.integration-secrets.outputs.available == 'true'
        env:
          INTEGRATION_TARGET_PLATFORM: ios
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          INTEGRATION_AUTO_SEED: "1"
          INTEGRATION_REQUIRE_SEED: "1"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: bash scripts/run_turqapp_test_smoke.sh

      - name: Skip iOS integration smoke without secrets
        if: steps.integration-secrets.outputs.available != 'true'
        run: echo "iOS integration smoke skipped because required secrets are not configured."

      - name: Upload iOS integration smoke artifacts
        if: always() && steps.integration-secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-integration-smoke-artifacts
          path: artifacts/integration_smoke

  functions-tests:
    name: Functions Build + Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions deps
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Run Functions unit tests
        run: npm test

  rules-tests:
    name: Firestore + Storage Rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions deps
        run: npm ci

      - name: Run rules tests on emulators
        run: npm run test:rules

  worker-tests:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-shortlink-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-shortlink-worker/package-lock.json

      - name: Install Worker deps
        run: npm ci

      - name: Run Worker tests
        run: npm test
