name: TurqApp CI

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:

jobs:
  security-guards:
    name: Security Guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Security Regression Scan
        run: bash scripts/check_repo_security_regressions.sh

  flutter-quality:
    name: Flutter Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Unit + Widget tests
        run: flutter test --coverage

      - name: Enforce Coverage Floor
        run: bash scripts/check_flutter_coverage.sh

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-lcov
          path: coverage/lcov.info

  android-integration-smoke:
    name: Android Integration Smoke
    needs:
      - flutter-quality
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Run Android integration smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            INTEGRATION_SMOKE_DEVICE_ID=emulator-5554 \
            INTEGRATION_LOGIN_EMAIL="${{ secrets.INTEGRATION_LOGIN_EMAIL }}" \
            INTEGRATION_LOGIN_PASSWORD="${{ secrets.INTEGRATION_LOGIN_PASSWORD }}" \
            bash scripts/run_turqapp_test_smoke.sh

      - name: Upload integration smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-smoke-artifacts
          path: artifacts/integration_smoke

  functions-tests:
    name: Functions Build + Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions deps
        run: npm ci

      - name: Build Functions
        run: npm run build

      - name: Run Functions unit tests
        run: npm test

  rules-tests:
    name: Firestore + Storage Rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions deps
        run: npm ci

      - name: Run rules tests on emulators
        run: npm run test:rules

  worker-tests:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-shortlink-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-shortlink-worker/package-lock.json

      - name: Install Worker deps
        run: npm ci

      - name: Run Worker tests
        run: npm test
