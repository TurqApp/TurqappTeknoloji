name: Permission OS Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 2"

jobs:
  permission-os-matrix-android:
    name: Android Permission OS Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Install Functions deps for seed automation
        run: |
          cd functions
          npm ci

      - name: Run Android OS permission matrix on emulator
        env:
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          INTEGRATION_AUTO_SEED: "1"
          INTEGRATION_REQUIRE_SEED: "1"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            export INTEGRATION_SMOKE_DEVICE_ID=emulator-5554
            bash scripts/run_permission_os_matrix_suite.sh

      - name: Upload Android permission artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: permission-os-matrix-android-artifacts
          path: artifacts/integration_smoke

  permission-os-matrix-ios:
    name: iOS Permission OS Matrix
    runs-on: macos-14
    timeout-minutes: 100
    env:
      IOS_SIMULATOR_NAME: iPhone 16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Install Functions deps for seed automation
        run: |
          cd functions
          npm ci

      - name: Install CocoaPods deps
        run: |
          cd ios
          pod install

      - name: Boot iOS simulator
        run: |
          SIM_UDID="$(xcrun simctl list devices available | awk -v name="$IOS_SIMULATOR_NAME" -F '[()]' '$0 ~ name {print $2; exit}')"
          if [[ -z "$SIM_UDID" ]]; then
            echo "Simulator not found: $IOS_SIMULATOR_NAME"
            exit 1
          fi
          xcrun simctl boot "$SIM_UDID" || true
          open -a Simulator --args -CurrentDeviceUDID "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
          echo "INTEGRATION_SMOKE_DEVICE_ID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Run iOS OS permission matrix
        env:
          INTEGRATION_TARGET_PLATFORM: ios
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          INTEGRATION_AUTO_SEED: "1"
          INTEGRATION_REQUIRE_SEED: "1"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: bash scripts/run_permission_os_matrix_suite.sh

      - name: Upload iOS permission artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: permission-os-matrix-ios-artifacts
          path: artifacts/integration_smoke
