name: Release Gates

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android-release-master-e2e:
    name: Android Release Master E2E
    runs-on: ubuntu-latest
    timeout-minutes: 140
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Install Functions deps for seed automation
        run: |
          cd functions
          npm ci

      - name: Run Android release master suite
        env:
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          INTEGRATION_AUTO_SEED: "1"
          INTEGRATION_REQUIRE_SEED: "1"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            export INTEGRATION_SMOKE_DEVICE_ID=emulator-5554
            bash scripts/run_turqapp_master_e2e.sh

  android-release-product-depth:
    name: Android Release Product Depth
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        run: flutter pub get

      - name: Install Functions deps for seed automation
        run: |
          cd functions
          npm ci

      - name: Run Android release product-depth
        env:
          INTEGRATION_LOGIN_EMAIL: ${{ secrets.INTEGRATION_LOGIN_EMAIL }}
          INTEGRATION_LOGIN_PASSWORD: ${{ secrets.INTEGRATION_LOGIN_PASSWORD }}
          INTEGRATION_AUTO_SEED: "1"
          INTEGRATION_REQUIRE_SEED: "1"
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: |
            export INTEGRATION_SMOKE_DEVICE_ID=emulator-5554
            bash scripts/run_product_depth_e2e.sh

  android-release-process-death:
    name: Android Release Process Death
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
